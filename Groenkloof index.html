<!DOCTYPE html>
<html>
<head>
  <title>Groenkloof Interactive Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { height: 90vh; width: 100%; }
   .controls {
      padding: 10px;
      background: #f4f4f4;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
   .home-btn { background: #2ecc71; color: white; }
   .nothome-btn { background: #e74c3c; color: white; }
   .clear-btn { background: #7f8c8d; color: white; }
   .legend { font-size: 14px; }
   .legend span { margin-right: 15px; }
  </style>
</head>
<body>

  <div class="controls">
    <b>Click map to add pin:</b>
    <button class="home-btn" onclick="setMode('home')">📍 Green = Home</button>
    <button class="nothome-btn" onclick="setMode('nothome')">📍 Red = Not Home</button>
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
    <div class="legend">
      <span>🟢 <b id="homeCount">0</b> Homes</span>
      <span>🔴 <b id="nothomeCount">0</b> Not Home</span>
    </div>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1. Center map on Groenkloof, Pretoria
    var map = L.map('map').setView([-25.762, 28.228], 15); // Groenkloof coords

    // 2. Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 3. Pin colors
    var greenIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
      iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
    });

    var redIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
      iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
    });

    var currentMode = 'home'; // default
    var markers = [];

    // 4. Load saved pins from browser
    function loadPins() {
      var saved = JSON.parse(localStorage.getItem('groenkloofPins') || '[]');
      saved.forEach(function(p) {
        addMarker(p.lat, p.lng, p.type, false);
      });
      updateCounts();
    }

    // 5. Add marker function
    function addMarker(lat, lng, type, save = true) {
      var icon = type === 'home'? greenIcon : redIcon;
      var label = type === 'home'? 'Home' : 'Not Home';

      var marker = L.marker([lat, lng], {icon: icon}).addTo(map);
      marker.bindPopup('<b>' + label + '</b><br>Lat: ' + lat.toFixed(5) + '<br>Lng: ' + lng.toFixed(5) +
        '<br><button onclick="deleteMarker(' + markers.length + ')">Delete</button>');

      markers.push({lat: lat, lng: lng, type: type, marker: marker});

      if(save) savePins();
      updateCounts();
    }

    // 6. Click map to add pin
    map.on('click', function(e) {
      addMarker(e.latlng.lat, e.latlng.lng, currentMode);
    });

    // 7. Switch mode
    function setMode(mode) {
      currentMode = mode;
      document.querySelector('.home-btn').style.opacity = mode === 'home'? '1' : '0.6';
      document.querySelector('.nothome-btn').style.opacity = mode === 'nothome'? '1' : '0.6';
    }

    // 8. Save to localStorage
    function savePins() {
      var data = markers.map(m => ({lat: m.lat, lng: m.lng, type: m.type}));
      localStorage.setItem('groenkloofPins', JSON.stringify(data));
    }

    // 9. Delete single marker
    function deleteMarker(index) {
      map.removeLayer(markers[index].marker);
      markers.splice(index, 1);
      savePins();
      updateCounts();
      map.closePopup();
    }

    // 10. Clear all
    function clearAll() {
      if(confirm('Delete all pins?')) {
        markers.forEach(m => map.removeLayer(m.marker));
        markers = [];
        localStorage.removeItem('groenkloofPins');
        updateCounts();
      }
    }

    // 11. Update counts
    function updateCounts() {
      document.getElementById('homeCount').innerText = markers.filter(m => m.type === 'home').length;
      document.getElementById('nothomeCount').innerText = markers.filter(m => m.type === 'nothome').length;
    }

    // Load on start
    loadPins();
    setMode('home');
  </script>
</body>
</html>
